<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnituens Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030508;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: #38bdf8;
            --border-color: rgba(56, 189, 248, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Interactive Telemetry Canvas */
        #telemetry-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wrapper {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            z-index: 2;
            position: relative;
            background: rgba(3, 5, 8, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Abstract glowing cybersecurity node */
        .cyber-node {
            width: 24px;
            height: 24px;
            margin: 0 auto 32px auto;
            position: relative;
        }

        .cyber-node::before, .cyber-node::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--accent-glow);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .cyber-node::before {
            animation: pulse-ring 2.5s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .cyber-node::after {
            animation: pulse-core 2.5s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
            background-color: var(--accent-glow);
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            80%, 100% {
                transform: scale(2.2);
                opacity: 0;
            }
        }

        @keyframes pulse-core {
            0% {
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(0.8);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin: 0 0 16px 0;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 1.15rem;
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0 auto 40px auto;
            max-width: 480px;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-glow);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 100px;
            background-color: rgba(56, 189, 248, 0.03);
            margin-bottom: 24px;
        }

        .footer {
            font-size: 0.85rem;
            color: rgba(148, 163, 184, 0.3);
            letter-spacing: 0.05em;
            margin-top: 48px;
        }
    </style>
</head>
<body>
    <canvas id="telemetry-canvas"></canvas>

    <div class="wrapper">
        <div class="cyber-node"></div>
        <div class="badge">Stealth Protocol</div>
        <h1>Omnituens Technologies</h1>
        <p class="description">
            We create next-generation AI-integrated cybersecurity solutions.
        </p>
        <div class="footer">
            &copy; 2026 Omnituens Technologies. All rights reserved.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('telemetry-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const properties = {
            bgColor: '#030508',
            particleColor: 'rgba(56, 189, 248, 0.3)',
            lineColor: 'rgba(56, 189, 248, 0.07)',
            particleRadius: 1.5,
            particleCount: 80,
            maxVelocity: 0.4,
            lineLength: 150
        };

        window.onresize = function() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        };

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.velocityX = (Math.random() * (properties.maxVelocity * 2)) - properties.maxVelocity;
                this.velocityY = (Math.random() * (properties.maxVelocity * 2)) - properties.maxVelocity;
            }

            position() {
                if (this.x + this.velocityX > width || this.x + this.velocityX < 0) {
                    this.velocityX = -this.velocityX;
                }
                if (this.y + this.velocityY > height || this.y + this.velocityY < 0) {
                    this.velocityY = -this.velocityY;
                }
                this.x += this.velocityX;
                this.y += this.velocityY;
            }

            reDraw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, properties.particleRadius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fillStyle = properties.particleColor;
                ctx.fill();
            }
        }

        function drawLines() {
            let x1, y1, x2, y2, length, opacity;
            for (let i in particles) {
                for (let j in particles) {
                    x1 = particles[i].x;
                    y1 = particles[i].y;
                    x2 = particles[j].x;
                    y2 = particles[j].y;
                    length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                    if (length < properties.lineLength) {
                        opacity = 1 - (length / properties.lineLength);
                        ctx.lineWidth = '0.5';
                        ctx.strokeStyle = `rgba(56, 189, 248, ${opacity * 0.12})`;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.closePath();
                        ctx.stroke();
                    }
                }
            }
        }

        function init() {
            for (let i = 0; i < properties.particleCount; i++) {
                particles.push(new Particle());
            }
            loop();
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            for (let i in particles) {
                particles[i].position();
                particles[i].reDraw();
            }
            drawLines();
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
